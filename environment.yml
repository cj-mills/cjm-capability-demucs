# Environment for cjm-media-capability-demucs
# Provides Demucs v4 source separation with PyTorch CUDA support
name: cjm-capability-demucs
channels:
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python=3.12

  # System dependencies (conda-managed for proper linking)
  - ffmpeg

  # Pip dependencies
  - pip
  - pip:
    # PyTorch with CUDA
    - torch

    # Core capability infrastructure. Stage 8 (Option C): the substrate
    # (cjm-substrate) is AUTO-INJECTED by install-all schema v2 — listing it
    # here is redundant + pre-empts --substrate-source, so it's dropped. The
    # fused-era domain lib (cjm-media-capability-system) dissolved on migration; the
    # tool now depends only on the result data noun.
    - cjm-capability-primitives

    # Shared torch helpers for capabilitys (release_model / cuda_oom / resolve_device)
    - cjm-substrate-torch-utils

    # Demucs fork (inference-only, TorchCodec)
    - cjm-demucs-v4

    # Utilities
    - fastcore

    # Worker dependencies
    - fastapi
    - uvicorn
    - psutil
    - httpx
